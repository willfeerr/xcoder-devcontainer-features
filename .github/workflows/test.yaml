name: Test Features

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        baseImage:
          - debian:bookworm
          - ubuntu:24.04
          - mcr.microsoft.com/devcontainers/base:ubuntu
    steps:
      - uses: actions/checkout@v4
      - name: Install Dev Container CLI
        run: npm install --global @devcontainers/cli
      - name: Test XCoder Feature
        run: devcontainer features test --skip-scenarios -f xcoder -i "${{ matrix.baseImage }}" .

  scenarios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dev Container CLI
        run: npm install --global @devcontainers/cli
      - name: Test scenarios
        run: devcontainer features test -f xcoder --skip-autogenerated --skip-duplicated .
