name: Release Features

on:
  workflow_dispatch:

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish Features and generate docs
        uses: devcontainers/action@v1
        with:
          publish-features: "true"
          base-path-to-features: "./src"
          generate-docs: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create documentation pull request
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config --global user.email github-actions[bot]@users.noreply.github.com
          git config --global user.name github-actions[bot]
          branch="automated-documentation-${GITHUB_RUN_ID}"
          git checkout -b "$branch"
          git add 'src/**/README.md'
          git commit -m 'docs: update generated feature documentation' || exit 0
          git push origin "$branch"
          gh pr create \
            --title 'docs: update generated feature documentation' \
            --body 'Generated by the Dev Container Features release workflow.'
